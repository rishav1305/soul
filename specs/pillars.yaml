# Soul v2 — Global Pillar Definitions
# This is NOT a module spec. It defines the six non-negotiable constraints
# that every module, every line of code, and every commit must satisfy.

pillars:
  performant:
    description: "Fast and resource-efficient"
    constraints:
      - metric: "first_token_latency"
        target: "< 200ms"
        enforcement: "E2E timing assertion"
      - metric: "ws_overhead"
        target: "< 50 bytes per frame"
        enforcement: "Integration test"
      - metric: "frontend_bundle_size"
        target: "< 300KB gzipped"
        enforcement: "Build gate"
      - metric: "server_memory"
        target: "< 100MB at 10 concurrent sessions"
        enforcement: "Monitoring alert"
      - metric: "unnecessary_rerenders"
        target: "zero"
        enforcement: "E2E React profiler"
      - metric: "token_budget"
        target: "exact — no wasted tokens"
        enforcement: "Opus review"

  robust:
    description: "Handles every edge case without crashing"
    constraints:
      - metric: "panic_on_input"
        target: "zero panics on any input"
        enforcement: "Property-based fuzz tests"
      - metric: "nil_empty_oversized"
        target: "defined behavior for all boundary inputs"
        enforcement: "Unit tests per invariant"
      - metric: "db_atomicity"
        target: "all DB operations atomic"
        enforcement: "Integration test"
      - metric: "boundary_rendering"
        target: "graceful render with 0 sessions and 1000 messages"
        enforcement: "E2E boundary tests"
      - metric: "error_visibility"
        target: "every error path produces user-visible message"
        enforcement: "Opus review"
      - metric: "type_safety"
        target: "type system prevents invalid states"
        enforcement: "Static analysis (go vet, tsc --noEmit)"

  resilient:
    description: "Recovers automatically, degrades gracefully"
    constraints:
      - metric: "api_down_behavior"
        target: "UI shows status, retains state, reconnects"
        enforcement: "E2E simulated outage"
      - metric: "ws_reconnect"
        target: "auto-reconnect with exponential backoff"
        enforcement: "Integration test"
      - metric: "token_refresh_fallback"
        target: "disk fallback on refresh failure, then retry, then alert"
        enforcement: "Unit test"
      - metric: "session_persistence"
        target: "sessions restored after server restart"
        enforcement: "Integration test"
      - metric: "corrupt_db_handling"
        target: "detected, backup created or clean error"
        enforcement: "Unit test"
      - metric: "oom_behavior"
        target: "graceful shed, never crash"
        enforcement: "Load test"

  secure:
    description: "Hardened, minimal attack surface"
    constraints:
      - metric: "secrets_in_source"
        target: "zero secrets in code, config, or logs"
        enforcement: "SAST scan + CI gate"
      - metric: "input_sanitization"
        target: "all input sanitized, XSS-proof"
        enforcement: "E2E + property tests"
      - metric: "ws_origin_check"
        target: "origin validated on every WebSocket upgrade"
        enforcement: "Integration test"
      - metric: "sql_injection"
        target: "parameterized queries only, never string concat"
        enforcement: "Static pattern scan"
      - metric: "token_permissions"
        target: "OAuth files 0600, tokens never logged, never sent to frontend"
        enforcement: "File permission check + log scan"
      - metric: "dependency_audit"
        target: "all dependencies audited"
        enforcement: "npm audit + govulncheck"
      - metric: "rate_limiting"
        target: "rate limits on all API endpoints"
        enforcement: "Integration test"
      - metric: "csp_headers"
        target: "CSP headers on all HTTP responses"
        enforcement: "E2E header check"

  sovereign:
    description: "You own everything — zero external dependencies at runtime"
    constraints:
      - metric: "external_cdns"
        target: "zero external CDNs, fonts, or assets"
        enforcement: "E2E network audit"
      - metric: "saas_dependencies"
        target: "zero SaaS dependencies"
        enforcement: "Spec review"
      - metric: "local_storage"
        target: "SQLite local — no cloud databases"
        enforcement: "Architecture constraint"
      - metric: "git_hosting"
        target: "Gitea self-hosted"
        enforcement: "Push workflow"
      - metric: "telemetry"
        target: "zero telemetry or analytics"
        enforcement: "E2E network monitor"
      - metric: "artifact_locality"
        target: "all build artifacts in repo"
        enforcement: "Spec review"
      - metric: "api_abstraction"
        target: "Claude API abstracted and swappable"
        enforcement: "Opus review"
      - metric: "offline_capability"
        target: "offline reading via service worker"
        enforcement: "E2E offline test"

  transparent:
    description: "Every action is observable, every state change is traceable"
    constraints:
      - metric: "structured_event_logging"
        target: "every state transition logged as structured JSONL event"
        enforcement: "Unit tests per event emitter"
      - metric: "cli_queryability"
        target: "metrics queryable via CLI (status, cost, latency, errors)"
        enforcement: "Integration test"
      - metric: "frontend_telemetry"
        target: "frontend errors and slow renders reported to backend"
        enforcement: "E2E telemetry check"
      - metric: "alert_thresholds"
        target: "alerts fire on anomalies (latency, error rate, memory)"
        enforcement: "Unit test"
      - metric: "no_silent_failures"
        target: "all errors surface to user or log — no swallowed exceptions"
        enforcement: "Opus review"
      - metric: "cost_tracking"
        target: "API cost and token usage tracked per request"
        enforcement: "Integration test"
      - metric: "db_profiling"
        target: "DB query performance profiled per method with percentiles"
        enforcement: "Integration test"
      - metric: "log_rotation"
        target: "daily log rotation with retention"
        enforcement: "Unit test"

verification_matrix:
  - layer: "L1: Static Analysis"
    checks: "go vet, tsc --noEmit, secret scan, dep audit"
    pillars: ["robust", "secure"]
    cadence: "every commit"
  - layer: "L2: Unit Tests"
    checks: "public functions, edge cases, error paths"
    pillars: ["robust", "resilient", "transparent"]
    cadence: "every commit"
  - layer: "L3: Integration Tests"
    checks: "API contracts, WS protocol, DB operations"
    pillars: ["performant", "robust", "resilient", "secure", "transparent"]
    cadence: "every commit"
  - layer: "L4: E2E Tests"
    checks: "full user flows, timing, rendering"
    pillars: ["performant", "robust", "sovereign"]
    cadence: "pre-merge"
  - layer: "L5: Load Tests"
    checks: "concurrency, memory, degradation"
    pillars: ["performant", "resilient"]
    cadence: "weekly"
  - layer: "L6: Opus Review"
    checks: "diff review, architecture alignment, pillar compliance"
    pillars: ["performant", "robust", "resilient", "secure", "sovereign", "transparent"]
    cadence: "pre-merge"
  - layer: "L7: Visual Regression"
    checks: "screenshot comparison, layout shifts"
    pillars: ["performant", "robust"]
    cadence: "pre-merge (UI changes only)"
