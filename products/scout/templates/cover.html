<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cover Letter - {{.Company}}</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    font-size: 11pt;
    line-height: 1.6;
    color: #1a1a1a;
    padding: 0;
  }
  .container {
    max-width: 100%;
  }
  .date {
    text-align: right;
    font-size: 10pt;
    color: #555;
    margin-bottom: 24px;
  }
  .body-text {
    font-size: 11pt;
    color: #222;
    line-height: 1.7;
    text-align: justify;
    margin-bottom: 32px;
  }
  .signature {
    margin-top: 40px;
  }
  .signature .name {
    font-weight: 700;
    font-size: 12pt;
    color: #111;
    margin-bottom: 4px;
  }
  .signature .contact {
    font-size: 9.5pt;
    color: #555;
  }
  .signature .contact a {
    color: #555;
    text-decoration: none;
  }
</style>
</head>
<body>
<div class="container">
  {{if .Date}}
  <div class="date">{{.Date}}</div>
  {{end}}

  <div class="body-text">
    {{.CoverText}}
  </div>

  <div class="signature">
    <div class="name">{{.Name}}</div>
    <div class="contact">
      {{if .Email}}{{.Email}}{{end}}
      {{if .Website}} | <a href="{{.Website}}">{{.Website}}</a>{{end}}
    </div>
  </div>
</div>
</body>
</html>
